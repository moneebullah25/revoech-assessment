worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    access_log  off;
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Docker's embedded DNS — re-resolve every 5s so new replicas are picked up
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Response cache: warm cache serves from memory, bypasses backend entirely
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=fruit_cache:10m
        max_size=100m
        inactive=30s
        use_temp_path=off;

    upstream backend {
        least_conn;
        server backend:8000;
        keepalive 256;          # persistent connections to backend workers
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 8080;

        location /fruit {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";   # required for upstream keepalive
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Cache identical GET requests for 10s
            proxy_cache              fruit_cache;
            proxy_cache_valid        200 10s;
            proxy_cache_key          "$request_uri";
            proxy_cache_lock         on;
            proxy_cache_use_stale    error timeout updating;
            proxy_cache_background_update on;

            add_header X-Cache-Status $upstream_cache_status;
        }

        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }
    }
}
